{% extends "layout.html" %}

{% block head %}
<link rel="stylesheet" href="{{ asset_url('css/track_open.css') }}">
{% endblock %}

{% block main %}
<div class="track-grid">
    <div class="new-card">
        <div class="plus">+</div>
        <form action="/track_create" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input class="form-control form-control-sm" type="text" name="title"
                placeholder="New track name" pattern="[A-Za-z0-9]+" autocomplete="off" required>
            <button class="btn btn-primary btn-sm" type="submit">Create</button>
        </form>
    </div>

    {% for track in tracks %}
    <div class="track-card">
        <form action="/track_open" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="track_id" value="{{ track.id }}">
            <button type="submit" class="open-btn" title="Open {{ track.title }}">
                <img class="thumb" src="{{ track.thumbnail }}" alt="{{ track.title }} thumbnail">
                <div class="title">{{ track.title }}</div>
                <div class="pieces">
                    <span title="Straight">&ShortUpArrow; {{ track.counts.straight }}</span>
                    <span title="Curve">&#8634; {{ track.counts.curve }}</span>
                    <span title="Switch">&#8693; {{ track.counts.switch }}</span>
                    <span title="Crossing">&#10010; {{ track.counts.crossing }}</span>
                </div>
            </button>
        </form>
        <div class="card-actions">
            <form action="/track_rename" method="post"
                onsubmit="var n=prompt('New name for &quot;{{ track.title|e }}&quot;:','{{ track.title|e }}');
                         if(!n||!/^[A-Za-z0-9]+$/.test(n)){alert('Invalid name');return false;}
                         this.new_title.value=n;return true;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="track_id" value="{{ track.id }}">
                <input type="hidden" name="new_title" value="">
                <button type="submit" title="Rename">&#9998; Rename</button>
            </form>
            <form action="/track_delete" method="post"
                onsubmit="return confirm('Delete &quot;{{ track.title|e }}&quot;?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="track_id" value="{{ track.id }}">
                <button type="submit" class="delete-btn" title="Delete">&#128465; Delete</button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
