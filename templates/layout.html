<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <!-- http://getbootstrap.com/docs/5.3/ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="{{ asset_url('css/layout.css') }}">
    {% block head %}{% endblock %}

    <title>Duplino
    </title>
</head>

<body>


    <main class="container pb-3 text-center">
        {% block main %}{% endblock %}
    </main>

    {% if session["user_id"] %}
    <nav class="bottom-tabs" aria-label="Navigation">
        <a href="/" class="bottom-tab {% if request.path == '/' %}active{% endif %}">
            <span class="bottom-tab-icon">&#127968;</span>
            <span class="bottom-tab-label">Home</span>
        </a>
        <a href="/track_open" class="bottom-tab {% if request.path.startswith('/track') %}active{% endif %}">
            <span class="bottom-tab-icon">&#128739;</span>
            <span class="bottom-tab-label">Tracks</span>
        </a>
        <a href="/user_info" class="bottom-tab {% if request.path == '/user_info' %}active{% endif %}">
            <span class="bottom-tab-icon">&#128100;</span>
            <span class="bottom-tab-label">Account</span>
        </a>
        <a href="/user_logout" class="bottom-tab">
            <span class="bottom-tab-icon">&#128682;</span>
            <span class="bottom-tab-label">Log out</span>
        </a>
    </nav>
    {% else %}
    <nav class="bottom-tabs" aria-label="Navigation">
        <a href="/" class="bottom-tab {% if request.path == '/' %}active{% endif %}">
            <span class="bottom-tab-icon">&#127968;</span>
            <span class="bottom-tab-label">Home</span>
        </a>
        <a href="/user_register" class="bottom-tab {% if request.path == '/user_register' %}active{% endif %}">
            <span class="bottom-tab-icon">&#9997;</span>
            <span class="bottom-tab-label">Register</span>
        </a>
        <a href="/user_login" class="bottom-tab {% if request.path == '/user_login' %}active{% endif %}">
            <span class="bottom-tab-icon">&#128274;</span>
            <span class="bottom-tab-label">Log In</span>
        </a>
    </nav>
    {% endif %}

</body>

</html>
