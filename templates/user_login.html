{% extends "layout.html" %}

{% block main %}
<div class="landing">
    <img src="{{ url_for('static', filename='main.png') }}" alt="Train track designer" style="width:80px; margin-bottom:12px;">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Duplino" style="width:200px; margin-bottom:24px;">
    <form action="/user_login" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="name" placeholder="Name"
            type="text">
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
    </div>
    <button class="btn btn-primary" type="submit">Log In</button>
    </form>
    <p style="margin-top:16px; color:#555;">No account? <a href="/user_register" style="color:#2e7d32; font-weight:600;">Register</a></p>
</div>
{% endblock %}
