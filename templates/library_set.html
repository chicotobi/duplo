{% extends "layout.html" %}

{% block main %}
<style>
    .lib-page {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px;
    }

    .lib-header {
        text-align: center;
        margin-bottom: 18px;
    }

    .lib-header h2 {
        margin: 0 0 4px 0;
        color: #2e7d32;
    }

    .lib-header p {
        color: #555;
        margin: 0;
    }

    .lib-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 18px;
        margin-bottom: 24px;
    }

    .lib-card {
        background: linear-gradient(180deg, #fffbe7 0%, #fff3c4 100%);
        border: 3px solid #f9a825;
        border-radius: 22px;
        padding: 16px 12px 14px;
        text-align: center;
        box-shadow: 0 4px 0 #e0a615, 0 6px 14px rgba(0, 0, 0, 0.08);
        transition: transform 0.15s ease;
    }

    .lib-card:hover {
        transform: translateY(-3px);
    }

    .lib-card.curve { background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%); border-color: #1976d2; box-shadow: 0 4px 0 #145fa6, 0 6px 14px rgba(0,0,0,0.08); }
    .lib-card.switch { background: linear-gradient(180deg, #f3e5f5 0%, #e1bee7 100%); border-color: #8e24aa; box-shadow: 0 4px 0 #6a1b8d, 0 6px 14px rgba(0,0,0,0.08); }
    .lib-card.crossing { background: linear-gradient(180deg, #ffebee 0%, #ffcdd2 100%); border-color: #e53935; box-shadow: 0 4px 0 #b32a27, 0 6px 14px rgba(0,0,0,0.08); }

    .lib-card img {
        width: 100%;
        height: 110px;
        display: block;
        object-fit: contain;
    }

    .lib-name {
        font-weight: bold;
        font-size: 1.15em;
        margin: 4px 0 8px;
        color: #333;
        letter-spacing: 0.5px;
    }

    .stepper {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border-radius: 999px;
        padding: 4px;
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.08);
    }

    .stepper button {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        font-size: 1.4em;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        line-height: 1;
        transition: transform 0.1s ease, background 0.1s ease;
    }

    .stepper button.minus { background: #ef5350; }
    .stepper button.plus  { background: #66bb6a; }
    .stepper button:hover { transform: scale(1.08); }
    .stepper button:active { transform: scale(0.95); }

    .stepper input {
        width: 56px;
        text-align: center;
        font-size: 1.3em;
        font-weight: bold;
        border: none;
        background: transparent;
        color: #333;
        -moz-appearance: textfield;
    }
    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .submit-row {
        text-align: center;
    }

    .submit-row button {
        background: linear-gradient(180deg, #66bb6a 0%, #43a047 100%);
        color: #fff;
        font-size: 1.2em;
        font-weight: bold;
        padding: 12px 36px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 0 #2e7d32, 0 6px 12px rgba(0, 0, 0, 0.15);
        transition: transform 0.1s ease;
    }

    .submit-row button:hover { transform: translateY(-2px); }
    .submit-row button:active { transform: translateY(2px); box-shadow: 0 1px 0 #2e7d32; }
</style>

<div class="lib-page">
    <div class="lib-header">
        <h2>&#128722; My Track Library</h2>
        <p>How many pieces do you have at home?</p>
    </div>

    <form action="/library_set" method="post">
        <div class="lib-grid">
            {% for piece in ['straight', 'curve', 'switch', 'crossing'] %}
            <div class="lib-card {{ piece }}">
                <img src="{{ url_for('static', filename='pieces_svg/' + piece + '.svg') }}"
                     alt="{{ piece }}">
                <div class="lib-name">{{ piece|capitalize }}</div>
                <div class="stepper">
                    <button type="button" class="minus" onclick="step('{{ piece }}',-1)">&minus;</button>
                    <input type="number" id="{{ piece }}" name="{{ piece }}"
                           value="{{ user_lib[piece] }}" min="0" required>
                    <button type="button" class="plus" onclick="step('{{ piece }}',1)">+</button>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="submit-row">
            <button type="submit">&#128190; Save my library</button>
        </div>
    </form>
</div>

<script>
    function step(id, delta) {
        const el = document.getElementById(id);
        const v = Math.max(0, (parseInt(el.value, 10) || 0) + delta);
        el.value = v;
    }
</script>
{% endblock %}
