{% extends "layout.html" %}

{% block main %}
<style>
    /* ---------- Edit page chrome ---------- */
    main.container { padding: 0 !important; max-width: none !important; }
    body { overflow: hidden; }

    .edit-stage {
        position: fixed;
        inset: var(--nav-h, 56px) 0 0 0;   /* sit below the navbar */
        overflow: hidden;
    }

    #drawingCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: #7fbf52;
    }

    /* Top status strip */
    .status-strip {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 5;
        pointer-events: none;
    }

    .status-strip > * { pointer-events: auto; }

    .status-pill {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        border-radius: 999px;
        padding: 6px 14px;
        font-weight: 600;
        color: #333;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95em;
        white-space: nowrap;
    }

    .status-pill img { width: 22px; height: 22px; }

    .status-title {
        font-size: 1.05em;
        color: #1a1a1a;
    }

    .status-badge {
        background: #ef9a9a;
        color: #b71c1c;
    }

    .status-badge.closed {
        background: #a5d6a7;
        color: #1b5e20;
    }

    .counter-strip {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-left: auto;
    }

    .counter-pill {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 999px;
        padding: 4px 10px 4px 4px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        color: #333;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        font-variant-numeric: tabular-nums;
        font-size: 0.9em;
    }

    .counter-pill.over {
        background: #ffcdd2;
        color: #b71c1c;
    }

    .counter-pill img {
        width: 24px;
        height: 24px;
        background: #f5f5f5;
        border-radius: 50%;
        padding: 2px;
    }

    .icon-btn {
        background: rgba(255, 255, 255, 0.92);
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 1.1em;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        transition: transform 0.1s ease, background 0.1s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #333;
    }

    .icon-btn:hover { transform: scale(1.07); background: #fff; }
    .icon-btn:active { transform: scale(0.95); }

    /* Bottom floating toolbar */
    .toolbar {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 14px;
        z-index: 5;
        display: flex;
        gap: 10px;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px);
        padding: 10px 12px;
        border-radius: 18px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
        max-width: calc(100vw - 24px);
        flex-wrap: wrap;
        margin: 0;
    }

    .tb-group {
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .tb-divider {
        width: 1px;
        background: rgba(0, 0, 0, 0.1);
        margin: 0 2px;
    }

    .piece-tile {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 14px;
        border: 2px solid transparent;
        background: #f5f5f5;
        cursor: pointer;
        padding: 4px;
        transition: transform 0.1s ease, background 0.1s ease, border-color 0.1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .piece-tile img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
    }

    .piece-tile:hover { background: #eceff1; transform: translateY(-2px); }
    .piece-tile:active { transform: translateY(0); }

    .piece-tile.over {
        background: #ffebee;
        border-color: #ef5350;
    }

    .piece-tile.flip img { transform: scaleX(-1); }

    .piece-tile .badge {
        position: absolute;
        bottom: 2px;
        right: 4px;
        font-size: 0.7em;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.9);
        padding: 1px 6px;
        border-radius: 999px;
        color: #333;
        font-variant-numeric: tabular-nums;
    }

    .piece-tile.over .badge { background: #c62828; color: #fff; }

    .action-btn {
        width: 56px;
        height: 64px;
        border-radius: 14px;
        border: none;
        background: #eceff1;
        cursor: pointer;
        font-size: 1.4em;
        transition: transform 0.1s ease, background 0.1s ease;
        color: #333;
    }

    .action-btn.delete { background: #ffebee; color: #c62828; }
    .action-btn.rotate { background: #e3f2fd; color: #1565c0; }
    .action-btn.next   { background: #fff3e0; color: #ef6c00; }

    .action-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .action-btn:active { transform: translateY(0); }

    .save-pill {
        border: none;
        background: linear-gradient(180deg, #66bb6a 0%, #43a047 100%);
        color: #fff;
        font-weight: 700;
        padding: 0 22px;
        border-radius: 14px;
        cursor: pointer;
        height: 64px;
        font-size: 1em;
        box-shadow: 0 3px 0 #2e7d32;
        transition: transform 0.1s ease;
        white-space: nowrap;
    }

    .save-pill:hover { transform: translateY(-2px); }
    .save-pill:active { transform: translateY(2px); box-shadow: 0 1px 0 #2e7d32; }

    .save-pill.closed {
        background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%);
    }
</style>

<div class="edit-stage">
    <canvas id="drawingCanvas"></canvas>

    <div class="status-strip">
        <span class="status-pill status-title">&#128646; {{ title }}</span>
        <span class="status-pill status-badge {% if is_closed %}closed{% endif %}">
            {% if is_closed %}&#10004; Closed loop{% else %}&#9888; Open ends{% endif %}
        </span>
        <div class="counter-strip">
            {% for piece in ['straight', 'curve', 'switch', 'crossing'] %}
            <span class="counter-pill {% if counter[piece] > user_lib[piece] %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/' + piece + '.svg') }}" alt="{{ piece }}">
                {{ counter[piece] }} / {{ user_lib[piece] }}
            </span>
            {% endfor %}
            <button type="button" class="icon-btn" id="resetView" title="Reset view (double-click canvas)">&#8634;</button>
        </div>
    </div>

    <form action="/track_edit" method="post" class="toolbar">
        <div class="tb-group">
            <button type="submit" name="left" title="Left curve (&larr;)"
                class="piece-tile flip {% if counter.curve > user_lib.curve %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/curve.svg') }}" alt="left curve">
                <span class="badge">{{ counter.curve }}/{{ user_lib.curve }}</span>
            </button>
            <button type="submit" name="straight" title="Straight (&uarr;)"
                class="piece-tile {% if counter.straight > user_lib.straight %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/straight.svg') }}" alt="straight">
                <span class="badge">{{ counter.straight }}/{{ user_lib.straight }}</span>
            </button>
            <button type="submit" name="right" title="Right curve (&rarr;)"
                class="piece-tile {% if counter.curve > user_lib.curve %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/curve.svg') }}" alt="right curve">
                <span class="badge">{{ counter.curve }}/{{ user_lib.curve }}</span>
            </button>
            <button type="submit" name="switch" title="Switch (S)"
                class="piece-tile {% if counter.switch > user_lib.switch %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/switch.svg') }}" alt="switch">
                <span class="badge">{{ counter.switch }}/{{ user_lib.switch }}</span>
            </button>
            <button type="submit" name="crossing" title="Crossing (X)"
                class="piece-tile {% if counter.crossing > user_lib.crossing %}over{% endif %}">
                <img src="{{ url_for('static', filename='pieces_svg/crossing.svg') }}" alt="crossing">
                <span class="badge">{{ counter.crossing }}/{{ user_lib.crossing }}</span>
            </button>
        </div>

        <div class="tb-divider"></div>

        <div class="tb-group">
            <button type="submit" name="rotate" class="action-btn rotate" title="Rotate piece (R)">&#8635;</button>
            <button type="submit" name="next_ending" class="action-btn next" title="Next ending (Tab)">&#9193;</button>
            <button type="submit" name="delete" class="action-btn delete" title="Delete (Backspace)">&#10006;</button>
        </div>

        <div class="tb-divider"></div>

        <button type="submit" name="save" class="save-pill {% if is_closed %}closed{% endif %}" title="Save (Ctrl+S)">
            &#128190; Save{% if is_closed %} &amp; close{% endif %}
        </button>
    </form>
</div>

<script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        const nav = document.querySelector('nav');
        if (nav) document.documentElement.style.setProperty('--nav-h', nav.getBoundingClientRect().height + 'px');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    // Resize the canvas initially
    resizeCanvas();

    // Add an event listener to resize the canvas whenever the window is resized
    window.addEventListener('resize', () => { resizeCanvas(); draw(); }, false);

    let scale = 1;
    let posX = 0;
    let posY = 0;
    let startDistance = 0;
    let startScale = 1;
    let startX = 0;
    let startY = 0;
    let midpointX = 0;
    let midpointY = 0;
    let isDragging = false;
    let lastTouchEnd = 0;

    const pieces = {{ pathes | tojson }};
    const isClosed = {{ 'true' if is_closed else 'false' }};

    // ---------- Deterministic decorations (meadow) ----------
    function mulberry32(seed) {
        return function () {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }
    const _rand = mulberry32(20240507);
    const DECOR_RANGE = 1200;
    const decorations = [];
    for (let i = 0; i < 140; i++) {
        const r = _rand();
        let kind;
        if (r < 0.45) kind = 'tree';
        else if (r < 0.85) kind = 'bush';
        else kind = 'flower';
        decorations.push({
            x: (_rand() - 0.5) * 2 * DECOR_RANGE,
            y: (_rand() - 0.5) * 2 * DECOR_RANGE,
            kind,
            size: 7 + _rand() * 9,
            tone: _rand()
        });
    }
    const riverPath = [];
    for (let i = -DECOR_RANGE; i <= DECOR_RANGE; i += 25) {
        riverPath.push({ x: i, y: -380 + 35 * Math.sin(i * 0.012) + 10 * Math.cos(i * 0.04) });
    }

    // World -> canvas (canvas y is flipped relative to world y)
    const wx = x => canvas.width / 2 + x;
    const wy = y => canvas.height / 2 - y;

    function drawMeadow() {
        const x0 = -posX / scale, y0 = -posY / scale;
        const w = canvas.width / scale, h = canvas.height / scale;
        // base green
        ctx.fillStyle = '#7fbf52';
        ctx.fillRect(x0, y0, w, h);
        // soft darker patches for variation
        ctx.fillStyle = 'rgba(60, 130, 60, 0.18)';
        const seed = mulberry32(99);
        for (let i = 0; i < 30; i++) {
            const px = (seed() - 0.5) * 2 * DECOR_RANGE;
            const py = (seed() - 0.5) * 2 * DECOR_RANGE;
            const pr = 50 + seed() * 100;
            ctx.beginPath();
            ctx.arc(wx(px), wy(py), pr, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawRiver() {
        // water
        ctx.strokeStyle = '#5dade2';
        ctx.lineWidth = 22;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let i = 0; i < riverPath.length; i++) {
            const p = riverPath[i];
            if (i === 0) ctx.moveTo(wx(p.x), wy(p.y));
            else ctx.lineTo(wx(p.x), wy(p.y));
        }
        ctx.stroke();
        // highlight
        ctx.strokeStyle = '#aed6f1';
        ctx.lineWidth = 6;
        ctx.beginPath();
        for (let i = 0; i < riverPath.length; i++) {
            const p = riverPath[i];
            if (i === 0) ctx.moveTo(wx(p.x), wy(p.y + 4));
            else ctx.lineTo(wx(p.x), wy(p.y + 4));
        }
        ctx.stroke();
    }

    function drawTree(d) {
        const cx = wx(d.x), cy = wy(d.y);
        // trunk
        ctx.fillStyle = '#6b3e1f';
        ctx.fillRect(cx - d.size * 0.18, cy, d.size * 0.36, d.size * 0.7);
        // canopy
        ctx.fillStyle = d.tone < 0.5 ? '#2e7d32' : '#388e3c';
        ctx.beginPath();
        ctx.arc(cx, cy, d.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1b5e20';
        ctx.beginPath();
        ctx.arc(cx - d.size * 0.35, cy - d.size * 0.25, d.size * 0.45, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawBush(d) {
        const cx = wx(d.x), cy = wy(d.y);
        ctx.fillStyle = d.tone < 0.5 ? '#388e3c' : '#43a047';
        ctx.beginPath();
        ctx.arc(cx - d.size * 0.4, cy, d.size * 0.6, 0, Math.PI * 2);
        ctx.arc(cx + d.size * 0.4, cy, d.size * 0.6, 0, Math.PI * 2);
        ctx.arc(cx, cy - d.size * 0.4, d.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawFlower(d) {
        const cx = wx(d.x), cy = wy(d.y);
        ctx.fillStyle = d.tone < 0.33 ? '#fff59d' : (d.tone < 0.66 ? '#f48fb1' : '#ce93d8');
        for (let k = 0; k < 5; k++) {
            const a = k * Math.PI * 2 / 5;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(a) * d.size * 0.25, cy + Math.sin(a) * d.size * 0.25, d.size * 0.18, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#fbc02d';
        ctx.beginPath();
        ctx.arc(cx, cy, d.size * 0.15, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawDecorations() {
        for (const d of decorations) {
            if (d.kind === 'tree') drawTree(d);
            else if (d.kind === 'bush') drawBush(d);
            else drawFlower(d);
        }
    }

    function fillPolygon(path, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < path.length; i++) {
            if (i === 0) ctx.moveTo(wx(path[i].x), wy(path[i].y));
            else ctx.lineTo(wx(path[i].x), wy(path[i].y));
        }
        ctx.closePath();
        ctx.fill();
    }

    function railColor(c) {
        if (c === 'red') return '#c62828';
        if (c === 'green') return '#2e7d32';
        return '#bdbdbd';
    }

    function drawTiesAndRails(centerlines, color) {
        const tieSpacing = 7;
        const tieHalfLen = 6.5;
        const railOffset = 4;
        for (const cl of centerlines) {
            if (cl.length < 2) continue;
            const segs = [];
            let total = 0;
            for (let i = 1; i < cl.length; i++) {
                const dx = cl[i].x - cl[i - 1].x;
                const dy = cl[i].y - cl[i - 1].y;
                const len = Math.hypot(dx, dy);
                segs.push({ p0: cl[i - 1], p1: cl[i], len, cum: total });
                total += len;
            }
            // Ties (sleepers)
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 2.2;
            ctx.lineCap = 'butt';
            let segIdx = 0;
            for (let s = tieSpacing / 2; s < total; s += tieSpacing) {
                while (segIdx < segs.length - 1 && s > segs[segIdx].cum + segs[segIdx].len) segIdx++;
                const sg = segs[segIdx];
                const t = (s - sg.cum) / (sg.len || 1);
                const x = sg.p0.x + t * (sg.p1.x - sg.p0.x);
                const y = sg.p0.y + t * (sg.p1.y - sg.p0.y);
                const len = sg.len || 1;
                const nx = -(sg.p1.y - sg.p0.y) / len;
                const ny = (sg.p1.x - sg.p0.x) / len;
                ctx.beginPath();
                ctx.moveTo(wx(x + nx * tieHalfLen), wy(y + ny * tieHalfLen));
                ctx.lineTo(wx(x - nx * tieHalfLen), wy(y - ny * tieHalfLen));
                ctx.stroke();
            }
            // Rails (two parallel grey lines)
            ctx.strokeStyle = railColor(color);
            ctx.lineWidth = 1.4;
            ctx.lineCap = 'round';
            for (const side of [-1, 1]) {
                ctx.beginPath();
                for (let i = 0; i < cl.length; i++) {
                    let dx, dy;
                    if (i === 0) { dx = cl[1].x - cl[0].x; dy = cl[1].y - cl[0].y; }
                    else if (i === cl.length - 1) { dx = cl[i].x - cl[i - 1].x; dy = cl[i].y - cl[i - 1].y; }
                    else { dx = cl[i + 1].x - cl[i - 1].x; dy = cl[i + 1].y - cl[i - 1].y; }
                    const len = Math.hypot(dx, dy) || 1;
                    const nx = -dy / len, ny = dx / len;
                    const x = cl[i].x + side * railOffset * nx;
                    const y = cl[i].y + side * railOffset * ny;
                    if (i === 0) ctx.moveTo(wx(x), wy(y));
                    else ctx.lineTo(wx(x), wy(y));
                }
                ctx.stroke();
            }
        }
    }

    // ---------- Train path (only when closed) ----------
    let trainPath = null;
    function buildTrainPath() {
        if (!isClosed) { trainPath = null; return; }
        const segs = [];
        for (const p of pieces) {
            if (!p.centerlines) continue;
            for (const cl of p.centerlines) if (cl.length >= 2) segs.push(cl.map(q => ({ x: q.x, y: q.y })));
        }
        if (segs.length === 0) { trainPath = null; return; }
        const used = new Array(segs.length).fill(false);
        const chain = segs[0].slice();
        used[0] = true;
        const FIT_TOL = 6;
        while (true) {
            const tail = chain[chain.length - 1];
            let bestIdx = -1, bestRev = false, bestDist = Infinity;
            for (let i = 0; i < segs.length; i++) {
                if (used[i]) continue;
                const s = segs[i];
                const d1 = Math.hypot(s[0].x - tail.x, s[0].y - tail.y);
                const d2 = Math.hypot(s[s.length - 1].x - tail.x, s[s.length - 1].y - tail.y);
                if (d1 < bestDist) { bestDist = d1; bestIdx = i; bestRev = false; }
                if (d2 < bestDist) { bestDist = d2; bestIdx = i; bestRev = true; }
            }
            if (bestIdx < 0 || bestDist > FIT_TOL) break;
            const next = bestRev ? segs[bestIdx].slice().reverse() : segs[bestIdx];
            for (let j = 1; j < next.length; j++) chain.push(next[j]);
            used[bestIdx] = true;
        }
        // Close loop
        const head = chain[0], tail = chain[chain.length - 1];
        if (Math.hypot(head.x - tail.x, head.y - tail.y) > 0.1) chain.push({ x: head.x, y: head.y });

        const cum = [0];
        for (let i = 1; i < chain.length; i++) {
            cum.push(cum[i - 1] + Math.hypot(chain[i].x - chain[i - 1].x, chain[i].y - chain[i - 1].y));
        }
        trainPath = { pts: chain, cum, total: cum[cum.length - 1] };
    }

    function trainPosAt(s) {
        if (!trainPath || trainPath.total <= 0) return null;
        s = ((s % trainPath.total) + trainPath.total) % trainPath.total;
        const cum = trainPath.cum, pts = trainPath.pts;
        let lo = 0, hi = cum.length - 1;
        while (lo < hi - 1) {
            const mid = (lo + hi) >> 1;
            if (cum[mid] <= s) lo = mid; else hi = mid;
        }
        const span = Math.max(cum[hi] - cum[lo], 1e-6);
        const t = (s - cum[lo]) / span;
        return {
            x: pts[lo].x + t * (pts[hi].x - pts[lo].x),
            y: pts[lo].y + t * (pts[hi].y - pts[lo].y),
            ang: Math.atan2(pts[hi].y - pts[lo].y, pts[hi].x - pts[lo].x)
        };
    }

    function drawCar(offsetX, color, length) {
        ctx.fillStyle = color;
        ctx.fillRect(-length / 2, -5, length, 10);
        // wheels
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(-length / 2 + 3, 6, 2, 0, Math.PI * 2);
        ctx.arc(length / 2 - 3, 6, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawTrain(s) {
        const carSpec = [
            { color: '#c62828', len: 22, kind: 'loco' },
            { color: '#1565c0', len: 18, kind: 'car' },
            { color: '#f9a825', len: 18, kind: 'car' }
        ];
        let off = 0;
        for (const car of carSpec) {
            const pos = trainPosAt(s - off - car.len / 2);
            if (!pos) return;
            ctx.save();
            ctx.translate(wx(pos.x), wy(pos.y));
            // Canvas y is flipped, so negate angle
            ctx.rotate(-pos.ang);
            drawCar(0, car.color, car.len);
            if (car.kind === 'loco') {
                // chimney
                ctx.fillStyle = '#212121';
                ctx.fillRect(-car.len / 2 + 3, -8, 4, 4);
                // cab
                ctx.fillStyle = '#37474f';
                ctx.fillRect(car.len / 2 - 8, -7, 6, 4);
            }
            ctx.restore();
            off += car.len + 4;
        }
    }

    const drawElement = (path, color) => {
        // Used for the cursor (open polyline outline)
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < path.length; i++) {
            const xx = wx(path[i].x);
            const yy = wy(path[i].y);
            if (i === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
        }
        ctx.stroke();
    };

    let trainS = 0;
    let lastFrameT = performance.now();

    const draw = () => {
        ctx.save();
        ctx.setTransform(scale, 0, 0, scale, posX, posY);
        ctx.clearRect(-posX / scale, -posY / scale, canvas.width / scale, canvas.height / scale);

        drawMeadow();
        drawRiver();
        drawDecorations();

        for (const el of pieces) {
            if (el.cursor) {
                drawElement(el.path, el.color);
            } else {
                fillPolygon(el.path, '#616161');
                drawTiesAndRails(el.centerlines || [], el.color);
            }
        }

        if (trainPath) drawTrain(trainS);

        ctx.restore();
    };

    function animate(now) {
        const dt = Math.min((now - lastFrameT) / 1000, 0.05);
        lastFrameT = now;
        if (trainPath) {
            trainS += 70 * dt;
            draw();
        }
        requestAnimationFrame(animate);
    }

    const handleTouchStart = (evt) => {
        evt.preventDefault();
        if (evt.touches.length === 1) {
            let touch = evt.touches[0];
            startX = touch.pageX - posX;
            startY = touch.pageY - posY;
            isDragging = true;
        }
        if (evt.touches.length === 2) {
            const dx = evt.touches[0].pageX - evt.touches[1].pageX;
            const dy = evt.touches[0].pageY - evt.touches[1].pageY;
            startDistance = Math.sqrt(dx * dx + dy * dy);
            startScale = scale;
            midpointX = (evt.touches[0].pageX + evt.touches[1].pageX) / 2;
            midpointY = (evt.touches[0].pageY + evt.touches[1].pageY) / 2;
        }
    };

    const handleTouchMove = (evt) => {
        evt.preventDefault();
        if (evt.touches.length === 1 && isDragging) {
            let touch = evt.touches[0];
            posX = touch.pageX - startX;
            posY = touch.pageY - startY;
            draw();
        }
        if (evt.touches.length === 2) {
            const dx = evt.touches[0].pageX - evt.touches[1].pageX;
            const dy = evt.touches[0].pageY - evt.touches[1].pageY;
            const newDistance = Math.sqrt(dx * dx + dy * dy);
            const newScale = (newDistance / startDistance) * startScale;
            if (newScale >= 0.1 && newScale <= 10) {
                const scaleRatio = newScale / scale;

                // Calculate new positions based on the midpoint
                const canvasMidX = midpointX - canvas.offsetLeft;
                const canvasMidY = midpointY - canvas.offsetTop;
                posX = canvasMidX - (canvasMidX - posX) * scaleRatio;
                posY = canvasMidY - (canvasMidY - posY) * scaleRatio;

                scale = newScale;
                draw();
            }
        }
    };

    const handleTouchEnd = (evt) => {
        evt.preventDefault();
        isDragging = false;
        const now = new Date().getTime();
        if (now - lastTouchEnd <= 300) {
            resetCanvas();
        }
        lastTouchEnd = now;
    };

    const handleMouseDown = (evt) => {
        evt.preventDefault();
        isDragging = true;
        startX = evt.pageX - posX;
        startY = evt.pageY - posY;
    };

    const handleMouseMove = (evt) => {
        if (!isDragging) return;
        evt.preventDefault();
        posX = evt.pageX - startX;
        posY = evt.pageY - startY;
        draw();
    };

    const handleMouseUp = () => {
        isDragging = false;
    };

    const handleMouseWheel = (evt) => {
        evt.preventDefault();
        const delta = evt.deltaY < 0 ? 1.1 : 0.9;
        const newScale = scale * delta;
        if (newScale >= 0.1 && newScale <= 10) {
            const mouseX = evt.pageX - canvas.offsetLeft;
            const mouseY = evt.pageY - canvas.offsetTop;

            // Adjust posX and posY to keep the canvas centered on the mouse pointer
            posX -= (mouseX - posX) * (delta - 1);
            posY -= (mouseY - posY) * (delta - 1);

            scale = newScale;
            draw();
        }
    };

    const resetCanvas = () => {
        scale = 1;
        posX = 0;
        posY = 0;
        draw();
    };

    const handleDoubleClick = (evt) => {
        evt.preventDefault();
        resetCanvas();
    };

    canvas.addEventListener('touchstart', handleTouchStart);
    canvas.addEventListener('touchmove', handleTouchMove);
    canvas.addEventListener('touchend', handleTouchEnd);

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('wheel', handleMouseWheel);
    canvas.addEventListener('dblclick', handleDoubleClick);

    buildTrainPath();
    draw();
    if (trainPath) requestAnimationFrame(animate);

    document.getElementById('resetView').addEventListener('click', resetCanvas);

    // Keyboard shortcuts
    const submitByName = (name) => {
        const btn = document.querySelector(`button[name="${name}"]`);
        if (btn) btn.click();
    };
    document.addEventListener('keydown', (evt) => {
        if (evt.target && (evt.target.tagName === 'INPUT' || evt.target.tagName === 'TEXTAREA')) return;
        if (evt.ctrlKey && evt.key.toLowerCase() === 's') { evt.preventDefault(); submitByName('save'); return; }
        switch (evt.key) {
            case 'ArrowLeft':  evt.preventDefault(); submitByName('left'); break;
            case 'ArrowUp':    evt.preventDefault(); submitByName('straight'); break;
            case 'ArrowRight': evt.preventDefault(); submitByName('right'); break;
            case 's': case 'S': submitByName('switch'); break;
            case 'x': case 'X': submitByName('crossing'); break;
            case 'r': case 'R': submitByName('rotate'); break;
            case 'Tab': evt.preventDefault(); submitByName('next_ending'); break;
            case 'Backspace': case 'Delete': submitByName('delete'); break;
        }
    });
</script>
