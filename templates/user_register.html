{% extends "layout.html" %}

{% block main %}
<div class="landing">
    <a href="/"><img src="{{ url_for('static', filename='logo.png') }}" alt="Duplino" style="width:200px; margin-bottom:24px;"></a>
    <form action="/user_register" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <input autocomplete="off" pattern="[A-Za-z0-9]+" autofocus class="form-control mx-auto w-auto" name="name"
            placeholder="Name" type="text">
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="confirmation" placeholder="Repeat password" type="password">
    </div>
    <button class="btn btn-primary" type="submit">Register</button>
    </form>
</div>
{% endblock %}
