{% extends "layout.html" %}

{% block head %}
<link rel="stylesheet" href="{{ asset_url('css/library_set.css') }}">
{% endblock %}

{% block main %}
<div class="lib-page">
    <div class="lib-header">
        <h2>&#128100; {{ name }}</h2>
    </div>

    <form action="/library_set" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="lib-grid">
            {% for piece in ['straight', 'curve', 'switch', 'crossing'] %}
            <div class="lib-card {{ piece }}">
                <img src="{{ url_for('static', filename='pieces_svg/' + piece + '.svg') }}"
                     alt="{{ piece }}">
                <div class="lib-name">{{ piece|capitalize }}</div>
                <div class="stepper">
                    <button type="button" class="minus" onclick="step('{{ piece }}',-1)">&minus;</button>
                    <input type="number" id="{{ piece }}" name="{{ piece }}"
                           value="{{ user_lib[piece] }}" min="0" required>
                    <button type="button" class="plus" onclick="step('{{ piece }}',1)">+</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </form>

    <form action="/room_set" method="post" class="room-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h3>&#127968; Room size</h3>
        <div class="room-fields">
            <div class="stepper">
                <button type="button" class="minus" onclick="step('room_w',-1)">&minus;</button>
                <input type="number" id="room_w" name="room_w"
                       value="{{ room.room_w }}" min="1" max="10" required>
                <button type="button" class="plus" onclick="step('room_w',1)">+</button>
            </div>
            <span class="room-x">&times;</span>
            <div class="stepper">
                <button type="button" class="minus" onclick="step('room_h',-1)">&minus;</button>
                <input type="number" id="room_h" name="room_h"
                       value="{{ room.room_h }}" min="1" max="10" required>
                <button type="button" class="plus" onclick="step('room_h',1)">+</button>
            </div>
            <span class="room-unit">meters</span>
        </div>
    </form>

    <div style="margin-top:32px; display:flex; justify-content:center;">
        <form action="/user_delete" method="post"
              onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" style="color:#c62828; font-weight:600; background:none; border:1px solid #c62828; padding:8px 20px; border-radius:6px; cursor:pointer;">Delete account</button>
        </form>
    </div>
</div>

<script src="{{ asset_url('js/library_set.js') }}"></script>
{% endblock %}
