name: Deploy to PythonAnywhere

# One-time bootstrap on the PA host before the first deploy that includes
# alembic: run `python3 -m alembic stamp head` from PA_PROJECT_DIR so the
# existing schema is marked as already-migrated. Subsequent deploys then
# `alembic upgrade head` cleanly.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PA_USERNAME: ${{ secrets.PA_USERNAME }}
      PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
      PA_DOMAIN: ${{ secrets.PA_DOMAIN }}
      PA_PROJECT_DIR: ${{ secrets.PA_PROJECT_DIR }}
    steps:
      - name: Git pull via existing PythonAnywhere bash console
        run: |
          set -euo pipefail
          USER_CLEAN=$(printf '%s' "$PA_USERNAME" | tr -d '[:space:]')
          API="https://www.pythonanywhere.com/api/v0/user/${USER_CLEAN}"
          AUTH="Authorization: Token ${PA_API_TOKEN}"

          echo "Looking for an already-opened bash console..."
          CONSOLES_JSON=$(curl -sS --fail -H "$AUTH" "${API}/consoles/")
          CONSOLE_ID=$(printf '%s' "$CONSOLES_JSON" | python3 -c "
          import sys, json
          consoles = json.load(sys.stdin)
          for c in consoles:
              if c.get('executable') == 'bash':
                  print(c['id'])
                  break
          ")

          if [ -z "${CONSOLE_ID:-}" ]; then
            echo "::error::No bash console found. Open one at https://www.pythonanywhere.com/user/${USER_CLEAN}/consoles/ and leave the tab open, then re-run."
            exit 1
          fi
          echo "Using console id: $CONSOLE_ID"

          PROBE=$(curl -sS -o /dev/null -w "%{http_code}" -H "$AUTH" \
            -X POST "${API}/consoles/${CONSOLE_ID}/send_input/" \
            --data-urlencode 'input=
          ')
          if [ "$PROBE" != "200" ]; then
            echo "::error::Console $CONSOLE_ID returned HTTP $PROBE on send_input. Open it once in the browser at https://www.pythonanywhere.com/user/${USER_CLEAN}/consoles/${CONSOLE_ID}/ and re-run."
            exit 1
          fi

          MARK="__DEPLOY_$(date +%s%N)__"
          CMD="cd ${PA_PROJECT_DIR} && git pull --ff-only && /home/${USER_CLEAN}/.virtualenvs/myvirtualenv/bin/pip install -r requirements.txt && /home/${USER_CLEAN}/.virtualenvs/myvirtualenv/bin/python -m alembic upgrade head && echo ${MARK}_OK || echo ${MARK}_FAIL
          "
          echo "Sending git pull + migrations..."
          curl -sS --fail -H "$AUTH" \
            -X POST "${API}/consoles/${CONSOLE_ID}/send_input/" \
            --data-urlencode "input=${CMD}" > /dev/null

          echo "Waiting for command to finish..."
          for i in $(seq 1 80); do
            sleep 3
            OUT=$(curl -sS -H "$AUTH" "${API}/consoles/${CONSOLE_ID}/get_latest_output/" \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('output',''))")
            if echo "$OUT" | grep -q "${MARK}_OK"; then
              echo "$OUT"
              echo "Pull succeeded."
              exit 0
            fi
            if echo "$OUT" | grep -q "${MARK}_FAIL"; then
              echo "$OUT"
              echo "::error::git pull or migration failed on PythonAnywhere."
              exit 1
            fi
          done
          echo "::error::Timed out waiting for git pull."
          exit 1

      - name: Reload web app
        run: |
          set -euo pipefail
          USER_CLEAN=$(printf '%s' "$PA_USERNAME" | tr -d '[:space:]')
          DOMAIN_CLEAN=$(printf '%s' "$PA_DOMAIN" | tr -d '[:space:]')
          URL="https://www.pythonanywhere.com/api/v0/user/${USER_CLEAN}/webapps/${DOMAIN_CLEAN}/reload/"
          echo "Reloading: ${URL}"
          curl -sS --fail \
            -H "Authorization: Token ${PA_API_TOKEN}" \
            -X POST "${URL}"
          echo "Web app reloaded."
