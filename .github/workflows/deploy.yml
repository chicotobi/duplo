name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull on PythonAnywhere via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.pythonanywhere.com
          username: ${{ secrets.PA_USERNAME }}
          key: ${{ secrets.PA_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PA_PROJECT_DIR }}"
            git pull --ff-only
            # Uncomment if you ever add new dependencies:
            # pip install --user -r requirements.txt

      - name: Reload web app
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_DOMAIN: ${{ secrets.PA_DOMAIN }}
        run: |
          set -euo pipefail
          # Strip any whitespace/newlines that may have been pasted into secrets.
          USER_CLEAN=$(printf '%s' "$PA_USERNAME" | tr -d '[:space:]')
          DOMAIN_CLEAN=$(printf '%s' "$PA_DOMAIN" | tr -d '[:space:]')
          URL="https://www.pythonanywhere.com/api/v0/user/${USER_CLEAN}/webapps/${DOMAIN_CLEAN}/reload/"
          echo "Reloading: ${URL}"
          curl -sS --fail \
            -H "Authorization: Token ${PA_API_TOKEN}" \
            -X POST "${URL}"
          echo "Web app reloaded."
